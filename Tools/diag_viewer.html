<!doctype html>
<!--! @file diag_viewer.html
  @brief Static diagnostics viewer shell and styling.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bomberman Diagnostics Viewer</title>
  <style>
    :root {
      --bg: #10151d;
      --bg-strong: #0d1219;
      --panel: #171e28;
      --panel-strong: #1f2430;
      --panel-soft: #24303e;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --line-strong: #475569;
      --accent: #0042eb;
      --accent-2: #eb0042;
      --accent-soft: rgba(0, 66, 235, 0.16);
      --accent-soft-2: rgba(235, 0, 66, 0.12);
      --good: #39c98f;
      --bad: #eb5a76;
      --warn: #f2b14a;
      --card-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Iosevka", "Fira Code", "JetBrains Mono", monospace;
      position: relative;
      isolation: isolate;
      background: transparent;
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, var(--accent-soft) 0, transparent 22rem),
        radial-gradient(circle at bottom right, var(--accent-soft-2) 0, transparent 24rem),
        linear-gradient(180deg, var(--bg-strong) 0%, var(--bg) 100%);
      background-repeat: no-repeat;
      background-size: 36rem 36rem, 40rem 40rem, cover;
      background-position: top left, bottom right, center;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    h1, h2, h3 {
      margin: 0 0 0.8rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    p { margin: 0.3rem 0 0; color: var(--muted); }

    .hero {
      padding: 1.5rem;
      border: 1px solid var(--line-strong);
      background: linear-gradient(160deg, rgba(0, 66, 235, 0.12) 0%, var(--panel) 70%);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 1rem;
      box-shadow: var(--card-shadow);
    }

    .file-card label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .file-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .file-card-header label {
      margin: 0;
    }

    input[type="file"] {
      width: 100%;
      padding: 0.65rem;
      border: 1px dashed var(--line-strong);
      border-radius: 12px;
      background: #121924;
      color: var(--text);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .report-file {
      margin-top: 0.35rem;
      margin-bottom: 1.35rem;
      color: var(--muted);
      word-break: break-all;
    }

    .section-gap {
      margin-top: 1.55rem;
    }

    .report-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .clear-button {
      border: 1px solid var(--line);
      background: #121924;
      color: var(--text);
      width: 2rem;
      height: 2rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .clear-button:hover {
      border-color: var(--accent);
      color: #ffffff;
    }

    .clear-button:disabled {
      opacity: 0.45;
      cursor: default;
      border-color: var(--line);
      color: var(--muted);
    }

    .metric {
      background:
        linear-gradient(var(--panel-strong), var(--panel-strong)) padding-box,
        linear-gradient(90deg, rgba(0, 66, 235, 0.72), rgba(235, 0, 66, 0.72)) border-box;
      border-radius: 12px;
      padding: 0.75rem;
      border: 1px solid transparent;
    }

    .metric .label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .metric .value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      text-align: left;
      padding: 0.45rem 0.5rem;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    .events {
      margin: 0;
      padding-left: 1.2rem;
      font-size: 0.9rem;
    }

    .events li {
      margin: 0.25rem 0;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .bars {
      display: grid;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .bar-row {
      display: grid;
      gap: 0.35rem;
    }

    .bar-title {
      font-size: 0.88rem;
      color: var(--muted);
    }

    .bar-track {
      display: grid;
      gap: 0.35rem;
    }

    .bar-line {
      display: grid;
      grid-template-columns: minmax(7.5rem, auto) 1fr;
      align-items: center;
      gap: 0.75rem;
    }

    .bar-value {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .bar {
      position: relative;
      height: 1.2rem;
      background: var(--panel-soft);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .bar > span {
      position: absolute;
      inset: 0;
      width: 0;
      background: var(--accent);
    }

    .bar.bad > span {
      background: var(--bad);
    }

    .bar.good > span {
      background: var(--good);
    }

    .bar.neutral > span {
      background: var(--accent);
    }

    .bar-label {
      position: relative;
      z-index: 1;
      padding: 0 0.6rem;
      line-height: 1.2rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #f8fbfd;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    .delta-good { color: var(--good); }
    .delta-bad { color: var(--bad); }
    .delta-flat { color: var(--muted); }
  </style>
</head>
<body>
<main>
  <section class="hero">
    <h1>Bomberman Diagnostics Viewer</h1>
    <div class="controls">
      <div class="card file-card">
        <div class="file-card-header">
          <label for="fileA">Report A</label>
          <button id="clearTopA" class="clear-button" type="button" aria-label="Unload report A" data-clear-slot="a" disabled>×</button>
        </div>
        <input id="fileA" type="file" accept=".json,application/json">
      </div>
      <div class="card file-card">
        <div class="file-card-header">
          <label for="fileB">Report B</label>
          <button id="clearTopB" class="clear-button" type="button" aria-label="Unload report B" data-clear-slot="b" disabled>×</button>
        </div>
        <input id="fileB" type="file" accept=".json,application/json">
      </div>
    </div>
  </section>

  <section id="comparison" class="card" style="margin-top: 1rem;">
    <h2 id="comparisonTitle">Overview</h2>
    <div id="comparisonContent" class="empty">Load one or two reports to compare key metrics.</div>
  </section>

  <section class="grid-2">
    <section id="reportA" class="card">
      <h2>Report A</h2>
      <div class="empty">No report loaded.</div>
    </section>
    <section id="reportB" class="card">
      <h2>Report B</h2>
      <div class="empty">No report loaded.</div>
    </section>
  </section>
</main>

<script src="diag_viewer.js" defer></script>
</body>
</html>
