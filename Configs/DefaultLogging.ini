
; Base runtime logging level for the whole process.
; Channel loggers will not be allowed to go lower than info at runtime unless compile-time gating is even stricter
[log]
level=debug

; Per-channel logging levels.
[channels]
client=info
server=info
game=info
net.conn=info
net.packet=warn
net.proto=info
net.input=debug
net.snapshot=debug
net.diag=info
perf=info
test=debug