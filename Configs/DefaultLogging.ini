; Default logging configuration for local development and multiplayer testing.
; This profile is intentionally more verbose than a release-friendly default:
; - debug for client/server/runtime flow that is useful during iteration
; - warn for noisy packet/protocol/snapshot channels unless investigating an issue
; - trace still requires explicit opt-in
; The observed log level per channel is the strictest between the global log level and the channel log level.
; The log levels are: trace, debug, info, warn, error
[log]
level=debug

[channels]
client=debug
server=debug
game=debug
net.conn=debug
net.packet=warn
net.proto=warn
net.input=debug
net.snapshot=warn
net.diag=debug
