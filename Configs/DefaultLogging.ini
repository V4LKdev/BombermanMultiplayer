; Default logging configuration for the game.
; Logs should stay readable by default:
; - info for normal flow milestones
; - warn/error for anomalies
; - debug/trace only when explicitly enabled
; The observed log level per channel is the strictest between the global log level and the channel log level.
; The log levels are: trace, debug, info, warn, error
[log]
level=info

[channels]
client=info
server=info
game=info
net.conn=info
net.packet=warn
net.proto=warn
net.input=info
net.snapshot=warn
net.diag=info
